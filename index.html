<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanzasPro - Dashboard</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">

        <div class="sidebar__logo">
            <span class="sidebar__logo-icon">
                <i class="fa-solid fa-wallet">

                </i>
            </span>
            <span class="sidebar__logo-text">
                FinanzasPro
            </span>
        </div>
    
        <nav class="sidebar__nav">

            <ul>
                <li class="sidebar__item sidebar__item--active">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon">
                            <i class="fa-solid fa-house"></i>
                        </span>
                        <span class="sidebar--label">Dashboard</span>
                    </a>
                </li>

                <li class="sidebar__item">

                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon">
                            <i class="fa-solid fa-credit-card"></i>
                        </span>
                        <span class="sidebar__label">Creditos y TC</span>
                    </a>
                </li>

                <li class="sidebar__item">
                    <a href=""" class="sidebar__link">
                        <span class="sidebar__icon">
                            <i class="fa-solid fa-receipt"></i>
                        </span>
                        <span class="sidebar__label">Gastos</span>
                    </a>

                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon">
                            <i class="fa-soli fa-money-bill-transfer"></i>
                        </span>
                        <span class="sidebar__label">Pagos</span>
                    </a>

                </li>

                <li class="sidebar__item">
                    <a href="#" class="sidebar__link">
                        <span class="sidebar__icon">
                            <i class="fa-solid fa-chart-line"></i>
                        </span>
                        <span class="sidebar__label">Reportes</span>
                    </a>

                </li>

            </ul>



        </nav>

    </aside>

    <div class="wrapper">

        <header class="topbar">
            <button class="topbar__menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="topbar__search">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input type="text" placeholder="Buscar.......">
            </div>

            <div class="topbar__profile">
                <div class="topbar__avatar">GB</div>
                <div class="topbar__user-info">
                    <span class="topbar__user-name">Gilmer</span>
                    <span class="topbar__user-role">Personal</span>
                </div>
            </div>

            
        </header>

        <main class="main-content">

            <section class="stats">

                <div class="stats__card">
                    <div class="stats__info">
                        <span class="stats__number" id="total-deudas">$0</span>
                        <span class="stats__label">Total deudas</span>
                    </div>
                    <div class="stats__icon stats__icon--purple">
                        <i class="fa-solid fa-clock-rotate-left"></i>
                    </div>
                </div>

                <div class="stats__card">
                    <div class="stats__info">
                        <span class="stats__number" id="totalpagado">$0</span>
                        <span class="stats__label">Pagado este mes</span>
                    </div>
                    <div class="stats__icon stats__icon--gren">
                        <i class="fa-solid fa-circle-check"></i>
                    </div>
                    
                </div>

                <div class="stats__card">
                    <div class="stats__info">
                        <span class="stats__number" id="total-gastos">$0</span>
                        <span class="stats__label">Gastos del mes</span>
                    </div>
                    <div class="stats__icon stats__icon-orange">
                        <i class="fa-solid fa-receipt"></i>
                    </div>
                </div>

                <div class="stats__card">
                    <div class="stats__info">
                        <span class="stats__number" id="total-intereses">$0</span>
                        <span class="stats__label">Intereses pagados</span>
                        
                    </div>
                    <div class="stats__icon stats__icon-red">
                        <i class="fa-solid fa-triangle-exclamation"></i>
                    </div>
                </div>

            </section>

        </main>
    </div>
    

    <script src="/assets/js/creditos.js"></script>
    <script src="/assets/js/gastos.js"></script>
    <script src="/assets/js/pagos.js"></script>
    <script src="/assets/js/main.js"></script>

</body>
</html>
